services:
  - type: web
    name: free-open-router
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "10000"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: APP_NAME
        value: free-open-router
      - key: MODELS_CACHE_TTL_MS
        value: "3600000"
      - key: UPSTREAM_TIMEOUT_MS
        value: "60000"
      - key: SITE_URL
        value: https://free-open-router.onrender.com
      - key: CORS_ORIGIN
        value: "*"
    healthCheckPath: /api/healthz
